version: '3.8'

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cinecatalog-db
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=CineCatalogPass_123!
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql

  api:
    image: cinecatalog-api
    container_name: cinecatalog-api
    build:
      context: .
      dockerfile: CineCatalog API/Dockerfile
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=db;Database=CineCatalogDb;User Id=sa;Password=CineCatalogPass_123!;TrustServerCertificate=True
      - Jwt__Key=CineCatalogSuperSecretSecurityKey2026_ForDevelopmentOnly!
      - Jwt__Issuer=CineCatalogAPI
      - Jwt__Audience=CineCatalogClient
      - Jwt__DurationInMinutes=15
    depends_on:
      - db

volumes:
  mssql-data:
